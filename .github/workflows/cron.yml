name: Prebuild Briefings

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 KST
  workflow_dispatch:        # 수동 실행 가능
  push:
    branches: [main]      # 배포 시 자동 실행

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Call generate API
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://econsoop.vercel.app/api/generate \
            | tee response.json
          echo "--- HTTP 응답 확인 ---"
          cat response.json
